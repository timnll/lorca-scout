<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lorcana Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0f11;
    --surface:  #161820;
    --raised:   #1e2028;
    --border:   #2a2d38;
    --accent:   #c8a97e;
    --accent2:  #7ea3c8;
    --text:     #e8e4dc;
    --muted:    #6b7280;
    --danger:   #c87e7e;
    --radius:   10px;
    --font:     'Syne', sans-serif;
    --mono:     'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

  /* ── Layout ── */
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
  header { padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; }
  .url-form { display: flex; gap: 8px; flex: 1; min-width: 280px; }
  .url-form input {
    flex: 1; background: var(--raised); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 12px;
    outline: none; transition: border-color 0.15s;
  }
  .url-form input:focus { border-color: var(--accent); }
  .url-form input::placeholder { color: var(--muted); }
  .btn {
    background: var(--raised); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 16px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0e0f11; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { opacity: 0.88; color: #0e0f11; }
  .btn.small { font-size: 12px; padding: 5px 10px; }
  .event-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); display: flex; gap: 16px; flex-wrap: wrap; }
  .event-meta b { color: var(--text); }

  /* ── Main split ── */
  main { display: grid; grid-template-columns: 200px 1fr 360px; overflow: hidden; }
  @media (max-width: 1000px) { main { grid-template-columns: 1fr 360px; } .sidebar { display: none; } }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }

  /* ── Sidebar: historique événements ── */
  .sidebar { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); background: var(--surface); }
  .sidebar-header { padding: 12px 14px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .sidebar-clear { font-size: 10px; font-family: var(--mono); color: var(--muted); cursor: pointer; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; background: none; }
  .sidebar-clear:hover { color: var(--danger); border-color: var(--danger); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 3px; }
  .sidebar-event {
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    transition: background 0.12s; border: 1px solid transparent;
  }
  .sidebar-event:hover { background: var(--raised); border-color: var(--border); }
  .sidebar-event.active { background: var(--raised); border-color: var(--accent); }
  .se-id { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .se-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .se-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; gap: 6px; }
  .se-scouted { color: var(--accent); }
  .sidebar-empty { padding: 1.5rem 1rem; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.6; }

  /* ── Left: Pairings ── */
  .pairings-panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .panel-header { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .panel-title { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .round-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .round-label { font-family: var(--mono); font-size: 13px; color: var(--accent); min-width: 70px; text-align: center; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); width: 26px; height: 26px; cursor: pointer; font-size: 14px; transition: all 0.12s; }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .pairings-list { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }

  /* ── Pairing card ── */
  .pairing-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    display: grid; grid-template-columns: 28px 1fr 28px 1fr; align-items: center;
    gap: 0; overflow: hidden; transition: border-color 0.15s;
  }
  .pairing-card:hover { border-color: #3a3d4a; }
  .table-num { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; padding: 0 4px; }
  .vs-divider { font-family: var(--mono); font-size: 10px; color: var(--border); text-align: center; }
  .player-cell {
    padding: 10px 12px; cursor: pointer; transition: background 0.12s; border-radius: 0;
    display: flex; flex-direction: column; gap: 5px;
  }
  .player-cell:hover { background: var(--raised); }
  .player-cell.has-colors { border-left: 2px solid var(--accent); }
  .p-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-name.bye { color: var(--muted); font-style: italic; }
  .p-colors { display: flex; gap: 4px; min-height: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Right: Roster + color listing ── */
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab-btn { flex: 1; padding: 10px; font-family: var(--font); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; background: none; border: none; color: var(--muted); cursor: pointer; transition: all 0.15s; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; flex-direction: column; overflow: hidden; flex: 1; }
  .tab-panel.active { display: flex; }

  .search-bar { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .search-bar input {
    width: 100%; background: var(--raised); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 11px; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent2); }
  .search-bar input::placeholder { color: var(--muted); }
  .list-scroll { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

  /* ── Roster row ── */
  .roster-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    transition: border-color 0.12s; overflow: hidden;
  }
  .roster-row:hover { border-color: #3a3d4a; }
  .roster-row.has-colors { border-left: 2px solid var(--accent); }
  .roster-row-top { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer; }
  .r-name { flex: 1; font-size: 13px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r-colors { display: flex; gap: 3px; }
  .r-dot { width: 12px; height: 12px; border-radius: 50%; }
  .r-chevron { font-size: 11px; color: var(--muted); transition: transform 0.15s; flex-shrink: 0; }
  .roster-row.expanded .r-chevron { transform: rotate(180deg); }
  .roster-inline-picker {
    display: none; padding: 8px 10px 10px; border-top: 1px solid var(--border);
    background: var(--raised); gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .roster-row.expanded .roster-inline-picker { display: flex; }
  .inline-color-btn {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 99px; border: 1.5px solid transparent; cursor: pointer;
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    transition: all 0.12s; background: var(--surface);
  }
  .inline-color-btn:hover { border-color: var(--border); color: var(--text); }
  .inline-color-btn.sel { border-color: currentColor; color: var(--text); }
  .inline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .inline-clear { font-size: 11px; font-family: var(--mono); color: var(--muted); cursor: pointer; margin-left: auto; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; }
  .inline-clear:hover { color: var(--danger); border-color: var(--danger); }

  /* ── Color listing tab ── */
  .color-listing { flex: 1; overflow-y: auto; }
  .cl-group { margin: 0; }
  .cl-combo-header {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: var(--raised); border-bottom: 1px solid var(--border);
    font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0;
  }
  .cl-player { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .cl-player:hover { background: var(--raised); }
  .cl-player-name { font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--raised); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; width: 340px; max-width: 95vw;
    animation: slideUp 0.18s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-bottom: 20px; }
  .color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .color-opt { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
  .color-swatch {
    width: 42px; height: 42px; border-radius: 50%; border: 2px solid transparent;
    transition: all 0.15s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.12); box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }
  .color-swatch.selected::after {
    content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white; font-family: var(--font);
  }
  .color-name { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-note { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 14px; }
  .count-badge { font-family: var(--mono); font-size: 11px; color: var(--accent); }

  /* ── States ── */
  .loading-state, .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; color: var(--muted); font-family: var(--mono); font-size: 13px; gap: 8px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner { padding: 10px 16px; background: rgba(200,126,126,0.1); border: 1px solid var(--danger); border-radius: var(--radius); font-family: var(--mono); font-size: 12px; color: var(--danger); margin: 8px 16px; }
  .ws-badge { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 99px; border: 1px solid; }
  .ws-badge.connected { color: #7ec87e; border-color: #7ec87e; }
  .ws-badge.disconnected { color: var(--muted); border-color: var(--border); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Live indicator ── */
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #7ec87e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Lorcana<span>Scout</span></div>
    <div class="url-form">
      <input id="urlInput" type="text" placeholder="https://tcg.ravensburgerplay.com/events/492131" />
      <button class="btn primary" onclick="loadEvent()">Charger</button>
      <button class="btn small" onclick="refreshEvent()" title="Rafraîchir">↻</button>
    </div>
    <div id="wsBadge" class="ws-badge disconnected">WS off</div>
    <div id="metaBar" class="event-meta" style="display:none"></div>
  </header>

  <main>
    <!-- Sidebar historique -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Historique</div>
        <button class="sidebar-clear" onclick="clearHistory()">Vider</button>
      </div>
      <div id="sidebarList" class="sidebar-list">
        <div class="sidebar-empty">Aucun tournoi<br>chargé</div>
      </div>
    </div>

    <!-- Pairings -->
    <div class="pairings-panel">
      <div class="panel-header">
        <div class="panel-title">Pairings</div>
        <div class="round-nav">
          <button class="nav-btn" id="prevBtn" onclick="changeRound(-1)" disabled>‹</button>
          <div class="round-label" id="roundLabel">—</div>
          <button class="nav-btn" id="nextBtn" onclick="changeRound(1)" disabled>›</button>
        </div>
      </div>
      <div id="pairingsContent" class="pairings-list">
        <div class="empty-state">Entrez un lien d'événement pour commencer</div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('roster', this)">Roster</button>
        <button class="tab-btn" onclick="switchTab('colors', this)">Couleurs</button>
      </div>

      <!-- Roster tab -->
      <div class="tab-panel active" id="rosterTab">
        <div class="search-bar">
          <input id="searchInput" type="text" placeholder="Rechercher…" oninput="renderRoster()" />
        </div>
        <div id="rosterContent" class="list-scroll">
          <div class="empty-state">Aucun joueur</div>
        </div>
      </div>

      <!-- Colors listing tab -->
      <div class="tab-panel" id="colorsTab">
        <div class="color-listing" id="colorListingContent">
          <div class="empty-state">Aucune couleur renseignée</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-name" id="modalName"></div>
    <div class="modal-sub" id="modalSub">Sélectionne les couleurs du deck</div>
    <div class="modal-note" id="modalNote"></div>
    <div class="color-options" id="colorOptions"></div>
    <div class="modal-actions">
      <button class="btn small" onclick="clearAndSave()">Effacer</button>
      <button class="btn small primary" onclick="saveModal()">Valider</button>
    </div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const SERVER = IS_LOCAL ? 'http://localhost:3001' : `${location.protocol}//${location.host}`;

const WS_URL  = IS_LOCAL
  ? 'ws://localhost:3001'
  : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

const COLORS = [
  { id: 'amber',     label: 'Ambre',      hex: '#E9A326' },
  { id: 'amethyst',  label: 'Améthyste',  hex: '#9B59B6' },
  { id: 'emerald',   label: 'Émeraude',   hex: '#27AE60' },
  { id: 'ruby',      label: 'Rubis',      hex: '#C0392B' },
  { id: 'sapphire',  label: 'Saphir',     hex: '#2980B9' },
  { id: 'steel',     label: 'Acier',      hex: '#7F8C8D' },
];

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  eventId: null,
  meta: null,
  players: {},     // { name: { colors: [] } }
  rounds: [],
  currentRound: 0,
  editingPlayer: null,
  tempColors: [],
};
let ws = null;

// ── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  if (ws) ws.close();
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setBadge(true);
  ws.onclose = () => { setBadge(false); setTimeout(connectWS, 3000); };
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'playerUpdate' && data.eventId === state.eventId) {
      if (!state.players[data.player]) state.players[data.player] = {};
      state.players[data.player].colors = data.colors;
      renderAll();
    }
  };
}

function setBadge(on) {
  const b = document.getElementById('wsBadge');
  b.textContent = on ? '● live' : 'WS off';
  b.className = 'ws-badge ' + (on ? 'connected' : 'disconnected');
}

// ── Load event ───────────────────────────────────────────────────────────────
async function loadEvent(refresh = false) {
  const url = document.getElementById('urlInput').value.trim();
  const match = url.match(/events\/(\d+)/);
  if (!match) { return showToast('URL invalide', true); }
  const id = match[1];
  state.eventId = id;

  setPairingsContent(`<div class="loading-state"><div class="spinner"></div><span>Chargement du tournoi…</span></div>`);

  try {
    const res = await fetch(`${SERVER}/api/events/${id}${refresh ? '?refresh=1' : ''}`);
    if (!res.ok) throw new Error(`Serveur: ${res.status}`);
    const data = await res.json();
    applyEventData(data);
  } catch(err) {
    setPairingsContent(`<div class="error-banner">Erreur: ${err.message}<br>Le serveur tourne-t-il sur localhost:3001 ?</div>`);
  }
}

function refreshEvent() { loadEvent(true); }

// ── Historique localStorage ───────────────────────────────────────────────────
const HISTORY_KEY = 'lorcana-scout-history';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function addToHistory(eventId, meta, playerCount, scoutedCount) {
  const history = getHistory().filter(e => e.id !== eventId);
  history.unshift({
    id: eventId,
    name: meta?.title || `Tournoi #${eventId}`,
    location: meta?.location || '',
    players: playerCount,
    scouted: scoutedCount,
    loadedAt: Date.now(),
  });
  saveHistory(history.slice(0, 20)); // max 20 entrées
  renderSidebar();
}

function updateHistoryScout(eventId, scoutedCount) {
  const history = getHistory();
  const entry = history.find(e => e.id === eventId);
  if (entry) { entry.scouted = scoutedCount; saveHistory(history); renderSidebar(); }
}

function clearHistory() {
  if (confirm('Vider tout l\'historique ?')) { localStorage.removeItem(HISTORY_KEY); renderSidebar(); }
}

function renderSidebar() {
  const history = getHistory();
  const el = document.getElementById('sidebarList');
  if (!history.length) {
    el.innerHTML = '<div class="sidebar-empty">Aucun tournoi<br>chargé</div>';
    return;
  }
  el.innerHTML = history.map(e => `
    <div class="sidebar-event${state.eventId === e.id ? ' active' : ''}" data-eid="${e.id}">
      <div class="se-id">#${e.id}</div>
      <div class="se-name">${esc(e.name)}</div>
      <div class="se-meta">
        <span>${e.players || 0}j</span>
        ${e.scouted ? `<span class="se-scouted">${e.scouted} scouttés</span>` : ''}
      </div>
    </div>`).join('');
}

document.addEventListener('click', e => {
  const se = e.target.closest('.sidebar-event');
  if (!se) return;
  const eid = se.dataset.eid;
  if (eid && eid !== state.eventId) {
    document.getElementById('urlInput').value = `https://tcg.ravensburgerplay.com/events/${eid}`;
    loadEvent();
  }
});

function applyEventData(data) {
  state.meta = data.meta;
  state.players = data.players || {};
  state.rounds = data.rounds || [];
  state.currentRound = 0;

  const playerCount = Object.keys(state.players).length;
  const scoutedCount = Object.values(state.players).filter(p => p.colors?.length > 0).length;

  const meta = document.getElementById('metaBar');
  if (data.meta) {
    meta.style.display = 'flex';
    meta.innerHTML = `<span>${data.meta.title || ''}</span><span>${data.meta.location || ''}</span><span><b>${playerCount}</b> joueurs</span>`;
  }

  addToHistory(state.eventId, data.meta, playerCount, scoutedCount);
  renderAll();
  connectWS();
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderPairings();
  renderRoster();
  renderColorListing();
  // Mettre à jour le compteur de scouttés dans la sidebar
  if (state.eventId) {
    const scoutedCount = Object.values(state.players).filter(p => p.colors?.length > 0).length;
    updateHistoryScout(state.eventId, scoutedCount);
  }
}

function renderPairings() {
  const round = state.rounds[state.currentRound];
  document.getElementById('prevBtn').disabled = state.currentRound <= 0;
  document.getElementById('nextBtn').disabled = state.currentRound >= state.rounds.length - 1;

  if (!round) {
    document.getElementById('roundLabel').textContent = '—';
    if (state.eventId) {
      setPairingsContent(`<div class="empty-state">Pas de pairings disponibles<br>(tournoi terminé ou en attente)</div>`);
    }
    return;
  }

  document.getElementById('roundLabel').textContent = `Ronde ${round.num}`;

  const html = round.pairings.map(p => {
    const isBye2 = p.p2 === 'BYE' || !p.p2;
    return `
      <div class="pairing-card">
        <div class="table-num">${p.table}</div>
        ${playerCell(p.p1)}
        <div class="vs-divider">vs</div>
        ${isBye2 ? `<div class="player-cell"><div class="p-name bye">BYE</div></div>` : playerCell(p.p2)}
      </div>`;
  }).join('');

  setPairingsContent(html || '<div class="empty-state">Aucun pairing</div>');
}

function playerCell(name) {
  const p = state.players[name] || { colors: [] };
  const hasColors = p.colors && p.colors.length > 0;
  const dots = (p.colors || []).map(cid => {
    const c = COLORS.find(x => x.id === cid);
    return c ? `<div class="dot" style="background:${c.hex}" title="${c.label}"></div>` : '';
  }).join('');
  return `<div class="player-cell${hasColors ? ' has-colors' : ''}" onclick="openModal(${JSON.stringify(name)})">
    <div class="p-name">${esc(name)}</div>
    <div class="p-colors">${dots}</div>
  </div>`;
}

function renderRoster() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const entries = Object.entries(state.players)
    .filter(([n]) => n.toLowerCase().includes(q))
    .sort(([a],[b]) => a.localeCompare(b));

  if (!entries.length) {
    document.getElementById('rosterContent').innerHTML = '<div class="empty-state">Aucun joueur</div>';
    return;
  }

  const html = entries.map(([name, data]) => {
    const playerColors = data.colors || [];
    const dots = playerColors.map(cid => {
      const c = COLORS.find(x => x.id === cid);
      return c ? `<div class="r-dot" style="background:${c.hex}" title="${c.label}"></div>` : '';
    }).join('');
    const hasColors = playerColors.length > 0;

    const colorBtns = COLORS.map(c => {
      const isSel = playerColors.includes(c.id);
      return `<div class="inline-color-btn${isSel ? ' sel' : ''}" style="${isSel ? `color:${c.hex}` : ''}" data-action="color" data-color="${c.id}">
        <div class="inline-dot" style="background:${c.hex}"></div>${c.label}
      </div>`;
    }).join('');

    const safeId = btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g, '_');
    return `<div class="roster-row${hasColors ? ' has-colors' : ''}" id="rr-${safeId}" data-player="${esc(name)}">
      <div class="roster-row-top" data-action="toggle">
        <div class="r-name">${esc(name)}</div>
        <div class="r-colors">${dots}</div>
        <div class="r-chevron">▾</div>
      </div>
      <div class="roster-inline-picker">
        ${colorBtns}
        ${hasColors ? `<div class="inline-clear" data-action="clear">Effacer</div>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('rosterContent').innerHTML = html;
}

// ── Roster event delegation (évite les problèmes de caractères spéciaux dans onclick) ──
document.addEventListener('click', async function(e) {
  const row = e.target.closest('.roster-row');
  if (!row) return;
  const name = row.dataset.player;
  if (!name) return;

  const action = e.target.closest('[data-action]')?.dataset.action;
  if (!action) return;
  e.stopPropagation();

  if (action === 'toggle') {
    const wasExpanded = row.classList.contains('expanded');
    document.querySelectorAll('.roster-row.expanded').forEach(r => r.classList.remove('expanded'));
    if (!wasExpanded) row.classList.add('expanded');
    return;
  }

  if (action === 'color') {
    const colorId = e.target.closest('[data-color]')?.dataset.color;
    if (!colorId) return;
    if (!state.players[name]) state.players[name] = { colors: [] };
    const colors = [...(state.players[name].colors || [])];
    const idx = colors.indexOf(colorId);
    if (idx >= 0) colors.splice(idx, 1);
    else if (colors.length < 2) colors.push(colorId);
    else { colors.shift(); colors.push(colorId); }
    state.players[name].colors = colors;

    const safeId = btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g, '_');
    renderRoster();
    renderColorListing();
    const newRow = document.getElementById(`rr-${safeId}`);
    if (newRow) newRow.classList.add('expanded');

    try {
      await fetch(`${SERVER}/api/events/${state.eventId}/players/${encodeURIComponent(name)}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ colors }),
      });
    } catch(e) {}
    return;
  }

  if (action === 'clear') {
    if (!state.players[name]) return;
    state.players[name].colors = [];
    const safeId = btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g, '_');
    renderRoster();
    renderColorListing();
    const newRow = document.getElementById(`rr-${safeId}`);
    if (newRow) newRow.classList.add('expanded');
    try {
      await fetch(`${SERVER}/api/events/${state.eventId}/players/${encodeURIComponent(name)}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ colors: [] }),
      });
    } catch(e) {}
  }
});

function renderColorListing() {
  // Group by color combo
  const withColors = Object.entries(state.players)
    .filter(([, d]) => d.colors && d.colors.length > 0)
    .sort(([a],[b]) => a.localeCompare(b));

  if (!withColors.length) {
    document.getElementById('colorListingContent').innerHTML = '<div class="empty-state">Aucune couleur renseignée</div>';
    return;
  }

  // Group by sorted combo key
  const groups = {};
  withColors.forEach(([name, data]) => {
    const key = [...data.colors].sort().join('+');
    if (!groups[key]) groups[key] = { colors: data.colors, players: [] };
    groups[key].players.push(name);
  });

  const sortedGroups = Object.entries(groups).sort(([,a],[,b]) => b.players.length - a.players.length);

  const html = sortedGroups.map(([key, group]) => {
    const dots = group.colors.map(cid => {
      const c = COLORS.find(x => x.id === cid);
      return c ? `<div class="dot" style="background:${c.hex};width:12px;height:12px"></div>` : '';
    }).join('');
    const labels = group.colors.map(cid => COLORS.find(x => x.id === cid)?.label || cid).join(' + ');
    const playerRows = group.players.map(name =>
      `<div class="cl-player" onclick="openModal(${JSON.stringify(name)})">
        <div class="cl-player-name">${esc(name)}</div>
      </div>`
    ).join('');
    return `<div class="cl-group">
      <div class="cl-combo-header">${dots} ${labels} <span style="margin-left:auto">${group.players.length}x</span></div>
      ${playerRows}
    </div>`;
  }).join('');

  document.getElementById('colorListingContent').innerHTML = html;
}

// ── Round nav ────────────────────────────────────────────────────────────────
function changeRound(d) {
  state.currentRound = Math.max(0, Math.min(state.rounds.length - 1, state.currentRound + d));
  renderPairings();
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(name) {
  state.editingPlayer = name;
  state.tempColors = [...(state.players[name]?.colors || [])];
  document.getElementById('modalName').textContent = name;

  const existing = state.players[name]?.colors || [];
  document.getElementById('modalNote').textContent =
    existing.length ? `Actuel: ${existing.map(id => COLORS.find(c=>c.id===id)?.label||id).join(' + ')}` : '';

  renderModalColors();
  document.getElementById('modalOverlay').classList.add('open');
}

function renderModalColors() {
  document.getElementById('colorOptions').innerHTML = COLORS.map(c => `
    <div class="color-opt" onclick="toggleColor('${c.id}')">
      <div class="color-swatch${state.tempColors.includes(c.id) ? ' selected' : ''}" id="sw-${c.id}" style="background:${c.hex}"></div>
      <div class="color-name">${c.label}</div>
    </div>`).join('');
}

function toggleColor(id) {
  const idx = state.tempColors.indexOf(id);
  if (idx >= 0) {
    state.tempColors.splice(idx, 1);
  } else if (state.tempColors.length < 2) {
    state.tempColors.push(id);
  } else {
    // Replace the oldest
    state.tempColors.shift();
    state.tempColors.push(id);
  }
  renderModalColors();
}

function clearAndSave() {
  state.tempColors = [];
  saveModal();
}

async function saveModal() {
  const name = state.editingPlayer;
  document.getElementById('modalOverlay').classList.remove('open');
  if (!name || !state.eventId) return;

  // Optimistic update
  if (!state.players[name]) state.players[name] = {};
  state.players[name].colors = [...state.tempColors];
  renderAll();

  try {
    await fetch(`${SERVER}/api/events/${state.eventId}/players/${encodeURIComponent(name)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ colors: state.tempColors }),
    });
  } catch(e) {
    showToast('Hors ligne — changement local uniquement', true);
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
  if (tab === 'colors') renderColorListing();
}

// ── Utils ────────────────────────────────────────────────────────────────────
function setPairingsContent(html) { document.getElementById('pairingsContent').innerHTML = html; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, err = false) {
  const t = document.createElement('div');
  Object.assign(t.style, {
    position:'fixed', bottom:'20px', left:'50%', transform:'translateX(-50%)',
    background: err ? '#3a1515' : '#1a2a1a', border: `1px solid ${err ? '#c87e7e' : '#7ec87e'}`,
    color: err ? '#c87e7e' : '#7ec87e', padding: '8px 16px',
    borderRadius: '8px', fontFamily: "'DM Mono', monospace", fontSize: '12px',
    zIndex: '9999', animation: 'slideUp 0.2s ease',
  });
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('urlInput').value = 'https://tcg.ravensburgerplay.com/events/492131';
renderSidebar();
</script>
